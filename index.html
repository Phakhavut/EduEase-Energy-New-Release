
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="description" content="EduEase Energy Management Portal - Monitor, optimize, and manage your property's energy consumption.">
    <meta property="og:title" content="EduEase Energy | Management Portal">
    <meta property="og:description" content="Monitor, optimize, and manage your property's energy consumption.">
    <title>EduEase Energy | Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;600;700&family=Kanit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #000;
            color: #fff;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }
        .skip-link:focus {
            top: 0;
        }
        :root {
            --primary: #6f42c1; 
            --bg-body: #f1f5f9; /* sleek modern off-white light slate */
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff; 
            --text-main: #0f172a; /* deep charcoal with absolute contrast */
            --text-gray: #475569; /* highly legible slate-600 */
            --border: #cbd5e1; /* visible borders for card and layouts */
            --input-bg: #f8fafc;
            --accent: #10b981;
        }
        [data-theme="dark"] {
            --bg-body: #0b1437; 
            --sidebar-bg: #111c44; 
            --card-bg: #111c44;
            --text-main: #ffffff; 
            --text-gray: #f8fafc; /* high-contrast white/light-gray in dark mode */
            --border: #334155; /* distinct border in dark mode */
            --input-bg: #1b254b;
            --accent: #34d399;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }
        
        .dashboard-container {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Seamless global cross-fade transition details for widgets when theme switches */
        .dashboard-container,
        .dashboard-card,
        .sidebar,
        .sidebar *,
        .nav-link,
        .calculator-node,
        header,
        aside,
        p,
        h1, h2, h3, h4, h5, h6,
        span,
        i,
        input,
        select,
        button {
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        background 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
        }

        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Glassmorphism layouts for Login Portal with absolute contrast and readability */
        .glass-dark {
            background: rgba(11, 20, 55, 0.9) !important;
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.15) !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(15, 23, 42, 0.18) !important;
            box-shadow: 0 25px 50px rgba(15, 23, 42, 0.08);
        }

        /* Human-Eye Optimized High-Contrast Theme Overrides */
        [data-theme="dark"] {
            color-scheme: dark;
        }
        [data-theme="dark"] .text-dark {
            color: #ffffff !important;
        }
        [data-theme="dark"] .text-slate-950,
        [data-theme="dark"] .text-slate-900,
        [data-theme="dark"] .text-slate-850,
        [data-theme="dark"] .text-slate-800,
        [data-theme="dark"] .text-slate-700,
        [data-theme="dark"] .text-slate-600,
        [data-theme="dark"] .text-slate-500,
        [data-theme="dark"] .text-gray-900,
        [data-theme="dark"] .text-gray-800,
        [data-theme="dark"] .text-gray-700,
        [data-theme="dark"] .text-gray-600,
        [data-theme="dark"] .text-gray-500 {
            color: #f8fafc !important; /* Force beautiful light gray text, eliminating invisible dark texts on dark background */
        }
        [data-theme="dark"] .text-muted {
            color: #f1f5f9 !important; /* High contrast light gray/white */
        }
        [data-theme="dark"] .text-slate-400,
        [data-theme="dark"] .text-gray-400 {
            color: #f1f5f9 !important; /* Lighter gray for excellent readability in dark mode */
        }
        [data-theme="dark"] .bg-white {
            background-color: var(--card-bg) !important;
        }
        [data-theme="dark"] .bg-light {
            background-color: #1e293b !important; /* dark blue-slate */
        }
        [data-theme="dark"] .border-slate-200,
        [data-theme="dark"] .border-slate-100,
        [data-theme="dark"] .border-gray-200,
        [data-theme="dark"] .border-gray-100,
        [data-theme="dark"] .border {
            border-color: #334155 !important; /* clearly defined borders in dark mode */
        }
        [data-theme="dark"] hr {
            border-color: #334155 !important;
            opacity: 0.4;
        }
        [data-theme="dark"] .dashboard-card {
            background-color: var(--card-bg);
            border-color: #1e293b !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
        }
        [data-theme="dark"] .form-control, 
        [data-theme="dark"] .form-select {
            background-color: #1b254b !important;
            border-color: #334155 !important;
            color: #ffffff !important;
        }
        [data-theme="dark"] .form-control:focus,
        [data-theme="dark"] .form-select:focus {
            background-color: #253366 !important;
            color: #ffffff !important;
            border-color: var(--primary) !important;
        }
        [data-theme="dark"] .bg-white\/80 {
            background-color: rgba(17, 28, 68, 0.8) !important;
        }
        [data-theme="dark"] .text-black {
            color: #ffffff !important;
        }

        /* Light Theme Human-Eye Optimization */
        [data-theme="light"] {
            color-scheme: light;
        }
        [data-theme="light"] .text-dark {
            color: #0f172a !important; /* deep rich charcoal */
        }
        [data-theme="light"] .text-muted {
            color: #334155 !important; /* highly legible slate-700 */
        }
        [data-theme="light"] .text-slate-400,
        [data-theme="light"] .text-gray-400,
        [data-theme="light"] .text-slate-350,
        [data-theme="light"] .text-gray-350 {
            color: #334155 !important; /* Force high contrast slate-700, perfect on white */
        }
        [data-theme="light"] .text-slate-300,
        [data-theme="light"] .text-gray-300 {
            color: #1e293b !important; /* Force slate-800, very clear */
        }
        [data-theme="light"] .text-slate-500,
        [data-theme="light"] .text-gray-500 {
            color: #0f172a !important; /* Deep slate-900, perfectly legible */
        }
        [data-theme="light"] .text-slate-600,
        [data-theme="light"] .text-gray-600 {
            color: #0f172a !important; /* slate-900 */
        }
        [data-theme="light"] .text-slate-700,
        [data-theme="light"] .text-slate-800,
        [data-theme="light"] .text-slate-900 {
            color: #0f172a !important;
        }
        [data-theme="light"] .bg-light {
            background-color: #f1f5f9 !important; /* clean light slate-100 */
        }
        [data-theme="light"] .border,
        [data-theme="light"] .border-slate-200,
        [data-theme="light"] .border-slate-100,
        [data-theme="light"] .border-gray-200,
        [data-theme="light"] .border-gray-100 {
            border-color: #cbd5e1 !important; /* crisp clear borders instead of invisible ones */
        }
        [data-theme="light"] hr {
            border-color: #cbd5e1 !important;
            opacity: 0.6;
        }
        [data-theme="light"] .dashboard-card {
            background-color: #ffffff;
            border-color: #cbd5e1 !important; /* clean, clear borders for containers */
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04) !important;
        }
        [data-theme="light"] .form-control, 
        [data-theme="light"] .form-select {
            background-color: #ffffff !important;
            border-color: #cbd5e1 !important;
            color: #0f172a !important;
        }
        [data-theme="light"] .form-control:focus,
        [data-theme="light"] .form-select:focus {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px rgba(111, 66, 193, 0.15) !important;
        }
        [data-theme="light"] .form-control::placeholder {
            color: #64748b !important;
        }
        [data-theme="light"] .bg-white\/80 {
            background-color: rgba(255, 255, 255, 0.92) !important;
        }
        [data-theme="light"] .text-black {
            color: #0f172a !important;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* Custom Scrollbar for specific containers */
        .custom-scrollbar::-webkit-scrollbar {
            display: block;
            height: 10px;
            width: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--primary);
            opacity: 0.5;
            border-radius: 10px;
            border: 3px solid transparent;
            background-clip: padding-box;
        }

        .sidebar { 
            width: 280px; 
            height: 100vh; 
            position: fixed; 
            background: var(--sidebar-bg); 
            padding: 24px; 
            border-right: 1px solid var(--border); 
            z-index: 1000; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease;
        }

        /* Responsive Sidebar */
        @media (max-width: 991.98px) {
            .sidebar {
                transform: translateX(-100%);
                width: 300px;
                max-width: 85vw;
            }
            .sidebar.show {
                transform: translateX(0);
                box-shadow: 20px 0 50px rgba(0,0,0,0.15);
            }
            .main-content-dashboard {
                margin-left: 0 !important;
                padding: 16px 12px !important;
            }
        }

        .nav-link { 
            color: var(--text-gray) !important; 
            padding: 12px 18px !important; 
            border-radius: 16px !important; 
            margin-bottom: 4px !important; 
            cursor: pointer !important; 
            display: flex !important; 
            align-items: center !important; 
            text-decoration: none !important; 
            border: none !important; 
            background: transparent; 
            width: 100%; 
            transition: all 0.2s ease !important;
            font-weight: 500;
        }
        
        .nav-link:hover {
            background: rgba(111, 66, 193, 0.08) !important;
            color: var(--primary) !important;
        }

        .nav-link.active { 
            background: var(--primary) !important; 
            color: #fff !important; 
            box-shadow: 0 8px 20px rgba(111, 66, 193, 0.2);
        }

        .nav-link i { margin-right: 12px; width: 20px; text-align: center; }

        .main-content-dashboard { 
            margin-left: 280px; 
            padding: 40px; 
            transition: margin 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .dashboard-card { 
            background: var(--card-bg); 
            border-radius: 32px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        
        @keyframes theme-blur-in-dark {
            0% {
                filter: blur(8px);
                opacity: 0.85;
            }
            100% {
                filter: blur(0px);
                opacity: 1;
            }
        }

        @keyframes theme-blur-in-light {
            0% {
                filter: blur(8px);
                opacity: 0.85;
            }
            100% {
                filter: blur(0px);
                opacity: 1;
            }
        }

        [data-theme="dark"] .dashboard-card {
            animation: theme-blur-in-dark 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        [data-theme="light"] .dashboard-card {
            animation: theme-blur-in-light 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }
        
        .calculator-node {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .calculator-node::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            opacity: 0.2;
        }

        .calculator-node:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(111, 66, 193, 0.1);
        }

        .hologram-card {
            background: linear-gradient(135deg, #6f42c1 0%, #4e2b9a 100%);
            color: white;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(111, 66, 193, 0.3);
        }

        .tech-grid {
            background-image: 
                linear-gradient(rgba(111, 66, 193, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(111, 66, 193, 0.03) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .neon-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .label { color: var(--text-gray); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; }
        
        .neural-pulse {
            width: 10px; height: 10px; background: #10b981; border-radius: 50%;
            display: inline-block; animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-slide-left { animation: slideLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        .bg-transition {
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Overlay for mobile sidebar */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }
        @media (max-width: 991.98px) {
            .sidebar-overlay.show {
                display: block;
            }
        }

        /* Custom Range Slider for Hologram Card */
        .custom-range-slider {
            height: 6px;
            background: rgba(255,255,255,0.2) !important;
            border-radius: 10px;
        }
        .custom-range-slider::-webkit-slider-thumb {
            background: #fff !important;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
        /* Print Styles */
        @media print {
            .sidebar, header, .sidebar-overlay, .no-print {
                display: none !important;
            }
            .main-content-dashboard {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .dashboard-card {
                box-shadow: none !important;
                border: 1px solid #cbd5e1 !important;
                page-break-inside: avoid;
            }
            body {
                background: white !important;
                color: black !important;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
